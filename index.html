<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile U - Exam Schedule</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        input { padding: 12px; width: 80%; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px; font-size: 16px; }
        button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-top: 15px; text-align: left; }
        .course-code { color: #58a6ff; font-weight: bold; font-size: 1.2em; margin-bottom: 8px; }
        .exam-info { margin: 5px 0; color: #8b949e; font-size: 0.95em; }
        .exam-info strong { color: #c9d1d9; }
        .error { color: #f85149; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Exam Schedule Search</h1>
    <input type="text" id="studentId" placeholder="Enter Your University ID">
    <button onclick="searchSchedule()">Search</button>
    <div id="results"></div>
</div>
<script>
    async function searchSchedule() {
        const idInput = document.getElementById('studentId').value.trim();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Searching datasets...";
        
        if (!idInput) {
            resultsDiv.innerHTML = `<p class="error">Please enter a valid ID</p>`;
            return;
        }

        try {
            const response = await fetch('final_exams.json');
            const data = await response.json();
            
            // الفلترة الذكية: بتشوف لو الـ ID بتاع الطالب موجود جوة الـ array بتاعة الـ students_sets
            const studentExams = data.filter(item => item.students_sets && item.students_sets.includes(idInput));
            
            if (studentExams.length > 0) {
                resultsDiv.innerHTML = `<h2>Schedule for ID: ${idInput}</h2>`;
                studentExams.forEach(exam => {
                    resultsDiv.innerHTML += `
                        <div class="card">
                            <div class="course-code">${exam.course}</div>
                            <div class="exam-info">📅 <strong>Date:</strong> ${exam.date}</div>
                            <div class="exam-info">⏰ <strong>Time:</strong> ${exam.time}</div>
                            <div class="exam-info">📍 <strong>Room:</strong> ${exam.room}</div>
                        </div>`;
                });
            } else {
                resultsDiv.innerHTML = `<p class="error">No exams scheduled for ID ${idInput} or ID not found in current student sets.</p>`;
            }
        } catch (e) { 
            resultsDiv.innerHTML = `<p class="error">Error loading final_exams.json dataset.</p>`; 
        }
    }
</script>
</body>
</html>
