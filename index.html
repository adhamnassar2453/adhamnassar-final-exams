<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px 20px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 30px; }
        .search-container { margin-bottom: 20px; }
        input {
            padding: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #fff;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }
        button:hover { background-color: #15803d; }
        #results { margin-top: 20px; font-size: 1.2rem; }
        .error { color: #ef4444; }
        .success-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 8px;
            max-width: 450px;
            margin: 20px auto;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>Exam Schedule</h1>
    
    <div class="search-container">
        <input type="text" id="studentId" placeholder="Enter Student ID...">
        <br>
        <button onclick="searchExam()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        let examData = [];

        // نداء الملف بمسار نسبي حافي عشان يشتغل على GitHub Pages بدون مشاكل 404
        fetch('final_exams.json')
            .then(res => {
                if(!res.ok) throw new Error("File not found");
                return res.json();
            })
            .then(data => {
                examData = data;
                console.log("JSON loaded successfully!");
            })
            .catch(err => {
                console.error(err);
                document.getElementById('results').innerHTML = `<p class="error">Error loading JSON</p>`;
            });

        function searchExam() {
            const idInput = document.getElementById('studentId').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!idInput) {
                resultsDiv.innerHTML = `<p class="error">Please enter an ID</p>`;
                return;
            }

            if (examData.length === 0) {
                resultsDiv.innerHTML = `<p class="error">Data is still loading or failed to load.</p>`;
                return;
            }

            // فلترة عشان يجيب كل امتحانات الطالب (النظري والـ Lab)
            const studentExams = examData.filter(item => item.id === idInput);

            if (studentExams.length === 0) {
                resultsDiv.innerHTML = `<p class="error">No exams found for this ID.</p>`;
                return;
            }

            let htmlContent = '';
            studentExams.forEach(exam => {
                htmlContent += `
                    <div class="success-card">
                        <p><strong>Course:</strong> ${exam.course}</p>
                        <p><strong>Date:</strong> ${exam.date}</p>
                        <p><strong>Time:</strong> ${exam.time}</p>
                        <p><strong>Room:</strong> ${exam.room}</p>
                    </div>
                `;
            });
            resultsDiv.innerHTML = htmlContent;
        }
    </script>
</body>
</html>
