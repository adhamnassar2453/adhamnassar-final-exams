<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
        }
        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #30363d;
            background-color: #161b22;
            color: white;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background-color: #2ea043;
        }
        .result-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: 20px auto;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .result-card p {
            margin: 10px 0;
            font-size: 18px;
        }
        .error {
            color: #ff7b72;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Exam Schedule</h1>
    <input type="text" id="studentId" placeholder="Enter Student ID">
    <button onclick="searchExam()">Search</button>

    <div id="result"></div>

    <script>
        let examData = [];

        // المسار هنا متظبط على اسم ملف الـ JSON المظبوط اللي في الـ Repo عندك
        fetch('./final_exams.json')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                examData = data;
                console.log("JSON loaded successfully!");
            })
            .catch(error => {
                console.error('Error loading JSON:', error);
                document.getElementById('result').innerHTML = '<p class="error">Error loading JSON</p>';
            });

        function searchExam() {
            const idInput = document.getElementById('studentId').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!idInput) {
                resultDiv.innerHTML = '<p class="error">Please enter an ID</p>';
                return;
            }

            const studentExam = examData.find(item => item.id === idInput);

            if (!studentExam) {
                resultDiv.innerHTML = '<p class="error">No exams found for this ID.</p>';
                return;
            }

            resultDiv.innerHTML = `
                <div class="result-card">
                    <p><strong>Course:</strong> ${studentExam.course}</p>
                    <p><strong>Date:</strong> ${studentExam.date}</p>
                    <p><strong>Time:</strong> ${studentExam.time}</p>
                    <p><strong>Room:</strong> ${studentExam.room}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
