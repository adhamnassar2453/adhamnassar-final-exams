<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Exams Schedule</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        .container { width: 100%; max-width: 500px; text-align: center; margin-top: 40px; }
        h1 { color: #ffffff; font-size: 1.8rem; margin-bottom: 20px; }
        input { 
            padding: 12px; 
            width: 85%; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background: #161b22; 
            color: white; 
            margin-bottom: 15px; 
            font-size: 16px; 
            outline: none;
        }
        input:focus { border-color: #58a6ff; }
        button { 
            padding: 12px 24px; 
            background: #238636; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            width: 91%;
        }
        button:hover { background: #2ea043; }
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            padding: 15px; 
            margin-top: 15px; 
            text-align: left; 
        }
        .course-code { color: #58a6ff; font-weight: bold; font-size: 1.2em; margin-bottom: 8px; }
        .exam-info { margin: 6px 0; color: #8b949e; font-size: 0.95em; }
        .exam-info strong { color: #c9d1d9; }
        .error { color: #f85149; margin-top: 20px; font-weight: bold; }
        h2 { font-size: 1.3rem; color: #ffffff; margin-top: 25px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Final Exam Schedule</h1>
    <input type="text" id="studentId" placeholder="Enter Your ID or Set">
    <button onclick="searchSchedule()">Search</button>
    <div id="results"></div>
</div>

<script>
    async function searchSchedule() {
        const idInput = document.getElementById('studentId').value.trim();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Searching...";
        
        if (!idInput) {
            resultsDiv.innerHTML = `<p class="error">Please enter a valid ID</p>`;
            return;
        }

        try {
            const response = await fetch('final_exams.json');
            const data = await response.json();
            
            let studentExams = data.filter(item => {
                return item.students_sets && item.students_sets.toLowerCase().includes(idInput.toLowerCase());
            });
            
            if (studentExams.length > 0) {
                studentExams.sort((a, b) => {
                    const cleanDate = (dateStr) => {
                        const parts = dateStr.split(',');
                        if (parts.length >= 2) {
                            return parts[1].trim() + (parts[2] ? ',' + parts[2].trim() : '');
                        }
                        return dateStr;
                    };
                    return new Date(cleanDate(a.date)) - new Date(cleanDate(b.date));
                });

                resultsDiv.innerHTML = `<h2>Schedule for: ${idInput}</h2>`;
                studentExams.forEach(exam => {
                    resultsDiv.innerHTML += `
                        <div class="card">
                            <div class="course-code">${exam.course}</div>
                            <div class="exam-info">📅 <strong>Date:</strong> ${exam.date}</div>
                            <div class="exam-info">⏰ <strong>Time:</strong> ${exam.time}</div>
                            <div class="exam-info">📍 <strong>Room:</strong> ${exam.room}</div>
                        </div>`;
                });
            } else {
                resultsDiv.innerHTML = `<p class="error">No exams found for "${idInput}".</p>`;
            }
        } catch (e) { 
            resultsDiv.innerHTML = `<p class="error">Error loading final_exams.json</p>`; 
        }
    }
</script>
</body>
</html>
